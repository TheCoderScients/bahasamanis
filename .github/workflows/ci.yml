name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,web]"
      - name: Compile Python modules
        run: python -m py_compile bahasamanis.py bahasamanis_cli.py server.py
      - name: Validate VS Code JSON files
        run: |
          python -m json.tool vscode-bahasamanis/snippets/bm.json >/tmp/bm_snippets.json
          python -m json.tool vscode-bahasamanis/syntaxes/bm.tmLanguage.json >/tmp/bm_syntax.json
      - name: Run tests
        run: python -m pytest
      - name: Run CLI project workflow
        run: |
          bm cek --ketat examples
          bm paket examples
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          bm buat ci_bangun
          cd ci_bangun
          bm info
          bm paket
          bm bangun --ketat
          python build/utama.py
      - name: Run bundled demo examples
        run: bm jalankan examples/run_all_demos.bm
